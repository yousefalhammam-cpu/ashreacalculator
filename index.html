<style>
:root{
  --bg:#8d8d8d;
  --bg2:#6f6f6f;
  --shell:#9b9b9b;
  --shell2:#7d7d7d;
  --panel:#b6b6b6;
  --panel2:#8d8d8d;
  --dark:#2a2a2d;
  --dark2:#151518;
  --dark3:#3a3a3f;
  --line:rgba(255,255,255,.22);
  --line2:rgba(0,0,0,.28);
  --a:#f28a1e;
  --a2:#d96f06;
  --ag:rgba(242,138,30,.25);
  --g:#34d399;
  --am:#fbbf24;
  --r:#f87171;
  --t:#f4f4f5;
  --tm:#d4d4d8;
  --tb:#ffffff;
  --rad:14px;
  --rads:10px;
  --fa:'Cairo',sans-serif;
  --fe:'Rajdhani',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.12), transparent 28%),
    radial-gradient(circle at bottom right, rgba(0,0,0,.14), transparent 26%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:#111;
  font-family:var(--fa);
  overflow-x:hidden;
}
body::before,
body::after{display:none;}

.app{
  position:relative;
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding:14px 14px 120px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.09), rgba(0,0,0,.04)),
    linear-gradient(180deg, #a8a8a8 0%, #8f8f8f 45%, #7f7f7f 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.35),
    inset 0 -1px 0 rgba(0,0,0,.18);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 0 18px;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#2f2f34,#18181b);
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -2px 4px rgba(0,0,0,.35),
    0 2px 5px rgba(0,0,0,.18);
  font-size:20px;
}
.logo-text{
  font-family:var(--fe);
  font-size:22px;
  font-weight:700;
  color:#111827;
  letter-spacing:.5px;
}
.logo-text span{color:var(--a2);}
.logo-sub{
  font-size:10px;
  color:#374151;
  letter-spacing:2px;
  font-family:var(--fe);
  text-transform:uppercase;
}

.lang-btn{
  border:1px solid rgba(0,0,0,.22);
  color:#111827;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  font-family:var(--fe);
  font-size:13px;
  font-weight:700;
  background:linear-gradient(180deg,#d9d9d9,#b9b9b9);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.55),
    inset 0 -1px 2px rgba(0,0,0,.15);
  transition:all .2s;
}
.lang-btn:hover{filter:brightness(1.03);}
.lang-btn:active{transform:translateY(1px);}

.dash,
.card,
.con-card,
.set-group{
  background:
    linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.02)),
    linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid rgba(0,0,0,.22);
  border-radius:var(--rad);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.38),
    inset 0 -1px 0 rgba(0,0,0,.14),
    0 2px 8px rgba(0,0,0,.08);
  position:relative;
}
.dash{padding:18px;margin-bottom:14px;overflow:hidden;}
.card{padding:16px;margin-bottom:14px;}
.dash::before,
.card::before,
.con-card::before,
.set-group::before{
  content:'';
  position:absolute;left:10px;right:10px;top:0;height:1px;
  background:rgba(255,255,255,.35);
}
.dash::after,
.card::after,
.con-card::after,
.set-group::after{
  content:'';
  position:absolute;left:12px;right:12px;bottom:0;height:1px;
  background:rgba(0,0,0,.15);
}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.met{
  background:linear-gradient(180deg,var(--dark3),var(--dark2));
  border:1px solid rgba(255,255,255,.06);
  border-radius:var(--rads);
  padding:12px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 -2px 6px rgba(0,0,0,.35);
}
.met.p{border-color:rgba(242,138,30,.18);}
.met.g{border-color:rgba(52,211,153,.18);}
.met.am{border-color:rgba(251,191,36,.18);}
.met-lbl{
  font-size:10px;color:#c7c7cc;text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:4px;font-family:var(--fe);
}
.met-val{
  font-family:var(--fe);
  font-size:26px;
  font-weight:700;
  color:#fff;
  line-height:1;
  transition:opacity .15s;
}
.met-val.fade{opacity:0;}
.met.p .met-val{color:var(--a);}
.met.g .met-val{color:var(--g);}
.met.am .met-val{color:var(--am);}
.met-unit{font-size:11px;color:#b0b0b8;font-family:var(--fe);margin-top:3px;}

.sec-ttl{
  font-size:11px;
  letter-spacing:2px;
  color:#374151;
  text-transform:uppercase;
  margin-bottom:14px;
  font-family:var(--fe);
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:700;
}
.sec-ttl::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.15);}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.row1{margin-bottom:10px;}
.lbl{
  font-size:11px;
  color:#374151;
  margin-bottom:5px;
  font-family:var(--fe);
  font-weight:700;
}

.ifield,
.dd-btn,
.dev-row,
.exp-btn,
.con-link,
.set-item,
.modal,
.cat-item{
  border-radius:var(--rads);
}

.ifield,
.dd-btn{
  background:linear-gradient(180deg,var(--dark3),var(--dark2));
  border:1px solid rgba(255,255,255,.08);
  min-height:48px;
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    inset 0 -2px 6px rgba(0,0,0,.35);
}
.ifield{
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .2s;
  font-family:var(--fm);
  font-size:17px;
}
.ifield.on{
  border-color:rgba(242,138,30,.45);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 -2px 6px rgba(0,0,0,.35),
    0 0 0 2px rgba(242,138,30,.18);
}
.ifield .cur{display:none;width:2px;height:18px;background:var(--a);animation:blink 1s infinite;margin-left:2px;}
.ifield.on .cur{display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ph{color:#9ca3af;font-size:13px;font-family:var(--fa);}

.dots{display:flex;gap:6px;margin-bottom:12px;}
.dot{flex:1;height:4px;border-radius:2px;background:rgba(0,0,0,.12);transition:background .2s;}
.dot.on{background:var(--a);}

.dd-wrap{position:relative;}
.dd-btn{
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  cursor:pointer;
  transition:all .2s;
  font-size:13px;
}
.dd-btn.open{
  border-color:rgba(242,138,30,.45);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    inset 0 -2px 6px rgba(0,0,0,.35),
    0 0 0 2px rgba(242,138,30,.18);
}
.dd-arr{color:#c4c4cc;font-size:10px;transition:transform .2s;flex-shrink:0;}
.dd-btn.open .dd-arr{transform:rotate(180deg);}
.dd-menu{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#232327;
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--rads);
  z-index:300;
  display:none;
  max-height:260px;
  overflow-y:auto;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
}
.dd-menu.show{display:block;}
.dd-item{
  padding:10px 14px;
  font-size:13px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  transition:background .15s;
  color:#fff;
}
.dd-item:last-child{border-bottom:none;}
.dd-item:hover,.dd-item.sel{background:rgba(242,138,30,.10);color:#fff;}
.dd-item-info{flex:1;}
.dd-item-sub{font-size:10px;color:#a1a1aa;margin-top:2px;font-family:var(--fe);}
.dd-badge{
  font-size:10px;font-family:var(--fe);
  background:#16161a;border:1px solid rgba(255,255,255,.06);
  padding:2px 7px;border-radius:4px;color:#d1d5db;flex-shrink:0;
}
.dd-cat-hdr{
  padding:8px 14px 4px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  color:var(--a);text-transform:uppercase;font-family:var(--fe);
  border-bottom:1px solid rgba(255,255,255,.05);
  margin-top:4px;background:rgba(242,138,30,.05);
}

.dev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.dev-row{
  background:linear-gradient(180deg,var(--dark3),var(--dark2));
  border:1px solid rgba(255,255,255,.06);
  padding:10px 12px;
  display:flex;align-items:center;gap:8px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    inset 0 -2px 6px rgba(0,0,0,.35);
}
.dev-ico{font-size:22px;flex-shrink:0;}
.dev-info{flex:1;min-width:0;}
.dev-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dev-watt{font-size:11px;color:#c4c4cc;font-family:var(--fe);margin-top:1px;}
.dev-qty{display:flex;align-items:center;gap:5px;flex-shrink:0;}

.qbtn,
.dev-del,
.modal-x{
  user-select:none;
  transition:all .15s;
}

.qbtn{
  width:28px;height:28px;border-radius:6px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,#e1e1e1,#b7b7b7);
  color:#111827;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55), inset 0 -1px 2px rgba(0,0,0,.12);
}
.qbtn:hover{filter:brightness(1.03);}
.qnum{font-family:var(--fm);font-size:15px;font-weight:700;color:#fff;min-width:22px;text-align:center;}

.dev-btu{
  font-family:var(--fe);font-size:10px;color:#ffd28a;
  background:rgba(242,138,30,.12);
  border:1px solid rgba(242,138,30,.18);
  padding:2px 6px;border-radius:4px;flex-shrink:0;white-space:nowrap;
}
.dev-del{
  width:28px;height:28px;border-radius:6px;
  border:1px solid rgba(248,113,113,.25);
  background:linear-gradient(180deg,#ffd8d8,#ffb5b5);
  color:#991b1b;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dev-del:hover{filter:brightness(1.03);}
.dev-empty{
  text-align:center;color:#374151;padding:20px;font-size:13px;
  border:1px dashed rgba(0,0,0,.18);border-radius:var(--rads);
  background:rgba(255,255,255,.08);
}

.add-btn,
.exp-btn{
  width:100%;
  background:linear-gradient(180deg,#303035,#19191d);
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  padding:12px 14px;
  border-radius:var(--rads);
  font-size:14px;
  cursor:pointer;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--fa);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    inset 0 -2px 6px rgba(0,0,0,.35);
}
.add-btn{margin-top:0;}
.add-btn:hover,.exp-btn:hover{border-color:rgba(242,138,30,.35);}

.dev-total{
  background:rgba(242,138,30,.12);
  border:1px solid rgba(242,138,30,.18);
  border-radius:var(--rads);
  padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:#7c2d12;margin-top:8px;
}

.pad{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.key{
  border-radius:12px;
  font-family:var(--fm);
  font-size:20px;
  font-weight:600;
  cursor:pointer;
  min-height:54px;
  display:flex;align-items:center;justify-content:center;
  user-select:none;
  transition:all .15s;
  border:1px solid rgba(0,0,0,.24);
  background:
    linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.04)),
    linear-gradient(180deg,#3a3a40,#1b1b1f);
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -2px 5px rgba(0,0,0,.35),
    0 1px 2px rgba(0,0,0,.10);
}
.key:hover{filter:brightness(1.03);}
.key:active{transform:scale(.96);}
.key.kac,
.key.kclr{
  background:
    linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,.08)),
    linear-gradient(180deg,#efefef,#bababa);
  color:#111827;
}
.key.kdel{
  background:
    linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,.08)),
    linear-gradient(180deg,#e8e8e8,#b4b4b4);
  color:#111827;
}
.key.kppl,.key.kcalc{
  background:
    linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.03)),
    linear-gradient(180deg,#f49a3a,#d56d09);
  color:#fff;
  border-color:rgba(122,58,0,.28);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -2px 5px rgba(0,0,0,.22),
    0 2px 4px rgba(0,0,0,.10);
}
.key.km3{
  font-size:14px;
  font-family:var(--fe);
  color:#d1d5db;
}
.key.kac{font-family:var(--fe);font-size:15px;font-weight:700;letter-spacing:1px;}
.key.kclr{font-size:14px;font-family:var(--fa);}
.key.kppl{font-size:16px;}
.key.kcalc{
  font-family:var(--fe);
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
  grid-column:span 2;
}

.breakdown{display:none;}
.breakdown.show{display:block;}
.br-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(0,0,0,.10);
}
.br-row:last-child{border-bottom:none;}
.br-lbl{font-size:13px;color:#374151;font-weight:700;}
.br-val{font-family:var(--fm);font-size:14px;color:#111827;}
.badge{
  display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;
  font-family:var(--fe);font-weight:700;
}
.ba{background:rgba(242,138,30,.12);color:#9a3412;border:1px solid rgba(242,138,30,.18);}
.bg{background:rgba(52,211,153,.12);color:#065f46;border:1px solid rgba(52,211,153,.18);}
.bam{background:rgba(251,191,36,.14);color:#92400e;border:1px solid rgba(251,191,36,.18);}

.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.hist-clr{
  background:linear-gradient(180deg,#efefef,#bababa);
  border:1px solid rgba(0,0,0,.22);
  color:#111827;
  padding:5px 12px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fa);
  transition:all .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
}
.hist-clr:hover{filter:brightness(1.03);}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-item{
  background:linear-gradient(180deg,var(--dark3),var(--dark2));
  border:1px solid rgba(255,255,255,.06);
  border-radius:var(--rads);
  padding:12px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    inset 0 -2px 6px rgba(0,0,0,.35);
}
.hist-info{font-size:12px;color:#c4c4cc;}
.hist-res{font-family:var(--fm);font-size:14px;font-weight:700;color:var(--a);}
.hist-empty{text-align:center;color:#374151;padding:24px;font-size:13px;font-weight:700;}

.con-card{padding:24px;text-align:center;}
.con-av{
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin:0 auto 16px;
  background:linear-gradient(180deg,#303035,#19191d);
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -2px 6px rgba(0,0,0,.35);
}
.con-name{font-size:20px;font-weight:700;color:#111827;margin-bottom:4px;}
.con-title{font-size:12px;color:#374151;letter-spacing:1px;margin-bottom:20px;font-family:var(--fe);text-transform:uppercase;}
.con-link{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:linear-gradient(180deg,var(--dark3),var(--dark2));
  border:1px solid rgba(255,255,255,.06);
  margin-bottom:8px;text-decoration:none;color:#fff;transition:all .2s;font-size:13px;
}
.con-link:hover{border-color:rgba(242,138,30,.35);}
.made-in{margin-top:20px;font-size:13px;color:#374151;font-weight:700;}

.set-group{overflow:hidden;margin-bottom:12px;}
.set-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;border-bottom:1px solid rgba(0,0,0,.10);
}
.set-item:last-child{border-bottom:none;}
.set-lbl{font-size:14px;color:#111827;font-weight:700;}
.set-sub{font-size:11px;color:#374151;margin-top:2px;}

.tog{
  width:44px;height:24px;
  background:linear-gradient(180deg,#d7d7d7,#b7b7b7);
  border-radius:12px;position:relative;cursor:pointer;transition:background .2s;
  border:1px solid rgba(0,0,0,.18);flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
}
.tog.on{background:linear-gradient(180deg,#f49a3a,#d56d09);}
.tog::after{
  content:'';
  position:absolute;top:2px;right:2px;width:18px;height:18px;
  background:#fff;border-radius:50%;transition:transform .2s;
  box-shadow:0 1px 2px rgba(0,0,0,.18);
}
.tog.on::after{transform:translateX(-20px);}

.bnav{
  position:fixed;
  bottom:0;left:0;right:0;
  background:
    linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.02)),
    linear-gradient(180deg,#a3a3a3,#7c7c7c);
  border-top:1px solid rgba(0,0,0,.24);
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 0 max(10px,env(safe-area-inset-bottom));
  z-index:100;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.35),
    0 -3px 10px rgba(0,0,0,.08);
}
.ni{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:6px 14px;color:#374151;transition:all .2s;
}
.ni.on{color:var(--a2);}
.ni-ico{font-size:20px;}
.ni-lbl{font-size:10px;font-family:var(--fa);font-weight:700;}

.panel{display:none;}
.panel.on{display:block;}

.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:500;display:none;align-items:flex-end;justify-content:center;
}
.overlay.on{display:flex;}
.modal{
  background:
    linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03)),
    linear-gradient(180deg,#b1b1b1,#8d8d8d);
  border:1px solid rgba(0,0,0,.22);
  border-radius:var(--rad) var(--rad) 0 0;
  width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-ttl{font-size:16px;font-weight:700;color:#111827;}
.modal-x{
  width:30px;height:30px;border-radius:50%;
  border:1px solid rgba(0,0,0,.22);
  background:linear-gradient(180deg,#efefef,#bababa);
  color:#111827;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;
}
.modal-x:hover{filter:brightness(1.03);}

.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ftab{
  padding:6px 12px;border-radius:20px;border:1px solid rgba(0,0,0,.18);
  background:linear-gradient(180deg,#e7e7e7,#bfbfbf);
